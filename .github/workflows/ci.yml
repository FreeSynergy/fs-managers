name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Format + Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout fs-libs
        run: git clone --depth=1 https://github.com/FreeSynergy/fs-libs.git "${{ github.workspace }}/../fs-libs"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (OOP lints)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::large_enum_variant \
            -D clippy::cognitive_complexity \
            -D clippy::too_many_arguments \
            -D clippy::too_many_lines \
            -D clippy::wildcard_imports \
            -D clippy::unused_self

      - name: Tests
        run: cargo test --workspace

  deny:
    name: Dependency licenses + advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fs-libs
        run: git clone --depth=1 https://github.com/FreeSynergy/fs-libs.git "${{ github.workspace }}/../fs-libs"
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo-deny check
        run: cargo deny check --all-features

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@main

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
